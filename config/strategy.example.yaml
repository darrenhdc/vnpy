# 策略配置
# 请先复制本文件为 strategy.yaml

# MovingAverageCrossStrategy 配置
moving_average_cross:
  # 订阅标的
  symbols:
    - "US.AAPL"
    - "US.TSLA"

  # K线周期 (vn.py 格式: 1m, 5m, 15m, 1h, 1d)
  interval: "1m"

  # 均线参数
  short_window: 5
  long_window: 20

  # 交易参数
  order_type: "LIMIT"
  limit_price_offset: 0.01          # 限价单偏移 ($)
  order_amount_usd: 3000.0          # 每次下单目标金额 (USD)，自动计算股数

  # 风控相关
  check_risk_before_order: true     # 下单前必须通过风控检查

# RSI 策略配置
rsi:
  symbols:
    - "US.AAPL"
    - "US.SPY"
  interval: "1h"
  rsi_period: 14
  oversold: 30.0
  overbought: 70.0
  order_amount_usd: 3000.0
  limit_price_offset: 0.01
  check_risk_before_order: true

  # 风控相关
  check_risk_before_order: true     # 下单前必须通过风控检查

# 全局策略设置
global:
  strategy_class: "MovingAverageCrossStrategy"
  bar_buffer_size: 100              # 每个标的保留的 K 线数量
